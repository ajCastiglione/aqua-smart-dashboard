# Deploy static build to GitHub Pages (Settings → Pages → Source: GitHub Actions).
# Project URL: https://<owner>.github.io/<repo>/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install
        run: npm ci

      # User/org Pages site (e.g. repo `user.github.io`) is served at domain root → base `/`.
      # Project sites use `https://<owner>.github.io/<repo>/` → base `/<repo>/`.
      - name: Set Vite base path for GitHub Pages
        id: vite_base
        run: |
          REPO="${{ github.event.repository.name }}"
          case "$REPO" in
            *.github.io)
              echo "path=/" >> "$GITHUB_OUTPUT"
              echo "Using root base path for user/org GitHub Pages site."
              ;;
            *)
              echo "path=/${REPO}/" >> "$GITHUB_OUTPUT"
              echo "Using project base path /${REPO}/"
              ;;
          esac

      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.vite_base.outputs.path }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          if [ -z "${VITE_API_BASE_URL}" ]; then
            echo "::error::Set repository secret VITE_API_BASE_URL (e.g. https://your-api-host:8080/api). Without it, axios calls /customer-profiles on github.io and you get 404s."
            exit 1
          fi
          npm run build

      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
